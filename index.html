<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://res.cloudinary.com/dnlgohkcc/image/upload/v1771959592/Untitled_design_49_mxxpip.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streamline Automations | Next-Gen AI Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      @media (max-width: 768px) {
        #VG_OVERLAY_CONTAINER .vg-widget-trigger {
          transform: scale(0.7);
          right: 16px !important;
          bottom: 16px !important;
        }
        #VG_OVERLAY_CONTAINER .vg-widget-iframe {
          right: 16px !important;
          bottom: 90px !important;
          width: calc(100% - 32px) !important;
          max-width: 340px !important;
        }
      }
      
      @media (min-width: 769px) {
        #VG_OVERLAY_CONTAINER .vg-widget-trigger {
          right: 24px !important;
          bottom: 24px !important;
        }
        #VG_OVERLAY_CONTAINER .vg-widget-iframe {
          right: 24px !important;
          bottom: 100px !important;
        }
      }
      
      /* Add delay for initial chat message */
      #VG_OVERLAY_CONTAINER .vg-widget-iframe {
        animation: fadeInDelayed 0.3s ease-in-out 2s both;
      }
      
      @keyframes fadeInDelayed {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      /* Hide chat widget while intro screen is active */
      .intro-active #VG_OVERLAY_CONTAINER {
        display: none !important;
      }
    </style>
    <script>function initApollo(){var n=Math.random().toString(36).substring(7),o=document.createElement("script");
    o.src="https://assets.apollo.io/micro/website-tracker/tracker.iife.js?nocache="+n,o.async=!0,o.defer=!0,
    o.onload=function(){window.trackingFunctions.onLoad({appId:"69ae6480a307ae00197b3fd9"})},
    document.head.appendChild(o)}initApollo();</script>
  </head>
  <body class="bg-gradient-to-b from-dark-950 to-dark-900 text-white">
    <div id="root"></div>
    <div id="VG_OVERLAY_CONTAINER"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Chat widget removed per request -->
  </body>
</html>
