<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Streamline Automations — UI Kit</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="./kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="sa-app">
<div id="root"></div>
<script type="text/babel" src="./components.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
function App() {
  const [route, setRoute] = React.useState(() => localStorage.getItem('sa-route') || '/');
  const onNav = (p) => { setRoute(p); localStorage.setItem('sa-route', p); window.scrollTo(0,0); };

  let page;
  if (route === '/') page = <HomePage onNav={onNav}/>;
  else if (route === '/contact') page = <ContactPage onNav={onNav}/>;
  else if (route === '/portfolio') page = <PortfolioPage onNav={onNav}/>;
  else if (route === '/websites') page = <PackagePage kind="websites" onNav={onNav}/>;
  else if (route === '/systems') page = <PackagePage kind="systems" onNav={onNav}/>;
  else if (route === '/hosting') page = <PackagePage kind="hosting" onNav={onNav}/>;
  else page = <HomePage onNav={onNav}/>;

  return (
    <div data-screen-label={route}>
      <Navbar route={route} onNav={onNav}/>
      {page}
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
