name: New MCP server
version: 0.0.1
schema: v1

mcpServers:
  - name: New MCP server
    command: npx
    args:
      - -y
      - <your-mcp-server>
    env: {}
    # Open port 8080 for inbound TCP traffic
    # The command below is a PowerShell command to create a firewall rule in Windows
    # If you are not using PowerShell, please consider the alternatives or the corresponding commands in your OS or framework
    scripts:
      setupFirewall: |
        New-NetFirewallRule -DisplayName "Allow HTTP‑Server 8080" -Direction Inbound -Protocol TCP -LocalPort 8080 -Action Allow

