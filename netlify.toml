# Netlify deploy config for streamline-automations.co.za.
# Mirrors vercel.json. Security headers, caching, www->apex redirect.
# Legacy case-study redirects live in public/_redirects.

[build]
  # The post-build prerender step (scripts/prerender.cjs) drives Puppeteer, which needs a
  # Chrome binary. Netlify only restores node_modules from cache, so puppeteer's postinstall
  # Chrome download (kept outside node_modules in PUPPETEER_CACHE_DIR) is lost between builds.
  # Install Chrome explicitly before building so the prerender always finds it.
  command = "npx puppeteer browsers install chrome && npm run build"
  publish = "dist"

[build.environment]
  # The LIVE site is the v2 (src/site) build — this MUST be true or the wrong app ships.
  VITE_SITE_V2 = "true"
  VITE_COMING_SOON = "false"
  # Cache Chrome inside the repo dir so Netlify's build cache persists it across deploys
  # (avoids re-downloading every build). Puppeteer reads this same path at launch.
  PUPPETEER_CACHE_DIR = "/opt/build/repo/.cache/puppeteer"

# Canonical host: redirect www -> apex.
[[redirects]]
  from = "https://www.streamline-automations.co.za/*"
  to = "https://streamline-automations.co.za/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://assets.apollo.io https://*.apollo.io https://us-assets.i.posthog.com https://app.cal.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' https:; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://region1.google-analytics.com https://us.i.posthog.com https://us-assets.i.posthog.com https://assets.apollo.io https://*.apollo.io https://dockerfile-1n82.onrender.com https://app.cal.com https://api.cal.com; frame-src 'self' https://cal.com https://app.cal.com https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://challenges.cloudflare.com; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=(), interest-cohort=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
